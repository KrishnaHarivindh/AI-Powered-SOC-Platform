services:
  postgres:
    image: postgres:16
    container_name: ai-soc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_soc}
      POSTGRES_USER: ${POSTGRES_USER:-soc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5433:5432"
    volumes:
      - soc_postgres_data:/var/lib/postgresql/data

volumes:
  soc_postgres_data:
